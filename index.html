<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SpeedRead">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-152.png">
<link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">
<title>SpeedRead</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --accent2: #ff4757;
    --text: #e8e8f0;
    --muted: #555570;
    --word-size: clamp(2.5rem, 10vw, 4.5rem);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
  }

  /* ── SCREENS ── */
  .screen { position: absolute; inset: 0; display: flex; flex-direction: column; transition: opacity .3s, transform .3s; }
  .screen.hidden { opacity: 0; pointer-events: none; transform: translateY(20px); }

  /* ── IMPORT SCREEN ── */
  #importScreen {
    background: var(--bg);
    padding: 0;
  }

  .import-header {
    padding: 3rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
  }

  .import-header h1 {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    letter-spacing: -0.03em;
    color: var(--text);
  }

  .import-header h1 span { color: var(--accent); }

  .import-header p {
    margin-top: .4rem;
    font-size: .75rem;
    color: var(--muted);
    letter-spacing: .05em;
  }

  .import-body {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem 2rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
  }

  /* paste area */
  .paste-area {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    position: relative;
  }

  .paste-area label {
    display: block;
    font-size: .65rem;
    letter-spacing: .12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: .6rem;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: .85rem;
    line-height: 1.6;
    resize: none;
  }

  textarea::placeholder { color: var(--muted); }

  /* file drop */
  .file-zone {
    background: var(--surface);
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 1.5rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
    position: relative;
  }

  .file-zone:hover, .file-zone.dragover {
    border-color: var(--accent);
    background: rgba(232,255,71,.04);
  }

  .file-zone input[type=file] {
    position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }

  .file-zone .icon {
    font-size: 2rem;
    margin-bottom: .5rem;
    display: block;
  }

  .file-zone p {
    font-size: .8rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .file-zone .filetypes {
    margin-top: .4rem;
    font-size: .65rem;
    letter-spacing: .1em;
    color: var(--accent);
  }

  /* settings row */
  .settings-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .8rem;
  }

  .setting-block {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
  }

  .setting-block label {
    display: block;
    font-size: .65rem;
    letter-spacing: .12em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: .6rem;
  }

  .setting-block .val-row {
    display: flex;
    align-items: center;
    gap: .5rem;
  }

  .setting-block input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  .setting-block input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  .setting-block .val-label {
    font-size: .75rem;
    color: var(--text);
    min-width: 2.5rem;
    text-align: right;
  }

  /* start button */
  .btn-start {
    width: 100%;
    padding: 1.1rem;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 12px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1rem;
    letter-spacing: .05em;
    cursor: pointer;
    transition: transform .1s, opacity .2s;
  }

  .btn-start:active { transform: scale(.97); }
  .btn-start:disabled { opacity: .35; cursor: default; }

  .word-count {
    font-size: .7rem;
    color: var(--muted);
    text-align: center;
    margin-top: -.4rem;
  }

  /* ── READER SCREEN ── */
  #readerScreen {
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }

  .reader-top {
    padding: 1.2rem 1.5rem .8rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .btn-back {
    background: none;
    border: 1.5px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: border-color .2s, color .2s;
    flex-shrink: 0;
  }

  .btn-back:hover { border-color: var(--text); color: var(--text); }

  .progress-wrap {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .1s linear;
    width: 0%;
  }

  .progress-label {
    font-size: .65rem;
    color: var(--muted);
    letter-spacing: .05em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* focus display */
  .focus-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    position: relative;
    padding: 1rem;
    cursor: pointer;
    user-select: none;
  }

  /* ORP line */
  .orp-line {
    width: min(85vw, 420px);
    position: relative;
    margin-bottom: 1.2rem;
  }

  .orp-line::before {
    content: '';
    position: absolute;
    top: -8px; bottom: -8px;
    left: calc(var(--orp-x, 30%) - .5px);
    width: 1px;
    background: var(--accent2);
    opacity: .6;
  }

  .word-display {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: var(--word-size);
    letter-spacing: -0.02em;
    line-height: 1.1;
    text-align: center;
    color: var(--text);
    min-height: 1.2em;
    word-break: break-word;
    transition: opacity .05s;
  }

  .word-display .orp-char {
    color: var(--accent2);
  }

  .pause-hint {
    font-size: .65rem;
    letter-spacing: .15em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 2rem;
    opacity: .7;
  }

  /* context preview */
  .context-preview {
    padding: 0 2rem 1rem;
    font-size: .75rem;
    color: var(--muted);
    line-height: 1.6;
    text-align: center;
    max-height: 60px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .context-preview .ctx-prev { opacity: .5; }
  .context-preview .ctx-curr { color: var(--text); font-weight: 500; }
  .context-preview .ctx-next { opacity: .5; }

  /* controls */
  .reader-controls {
    padding: 1rem 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: .8rem;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .wpm-row {
    display: flex;
    align-items: center;
    gap: .8rem;
  }

  .wpm-row label {
    font-size: .65rem;
    letter-spacing: .1em;
    color: var(--accent);
    text-transform: uppercase;
    white-space: nowrap;
  }

  .wpm-row input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    outline: none;
  }

  .wpm-row input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 50%;
    cursor: pointer;
  }

  .wpm-val {
    font-size: .8rem;
    color: var(--text);
    min-width: 3.5rem;
    text-align: right;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: .8rem;
  }

  .btn-ctrl {
    background: var(--surface);
    border: 1.5px solid var(--border);
    color: var(--text);
    border-radius: 10px;
    cursor: pointer;
    font-size: .85rem;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, border-color .15s;
  }

  .btn-ctrl:active { background: var(--border); }

  .btn-skip { width: 44px; height: 44px; font-size: .9rem; }

  .btn-play {
    width: 64px; height: 64px;
    border-color: var(--accent);
    color: var(--accent);
    font-size: 1.5rem;
    border-radius: 50%;
  }

  .btn-play:active { background: rgba(232,255,71,.1); }

  /* ── STATUS TOAST ── */
  .toast {
    position: fixed;
    bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: .6rem 1.2rem;
    border-radius: 8px;
    font-size: .75rem;
    letter-spacing: .05em;
    opacity: 0;
    transition: opacity .25s, transform .25s;
    pointer-events: none;
    z-index: 99;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── LOADING OVERLAY ── */
  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(10,10,15,.85);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
    z-index: 50;
    opacity: 0; pointer-events: none;
    transition: opacity .2s;
  }

  .loading-overlay.show { opacity: 1; pointer-events: all; }

  .spinner {
    width: 36px; height: 36px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay p { font-size: .8rem; color: var(--muted); letter-spacing: .1em; }

  /* scrollbar */
  .import-body::-webkit-scrollbar { width: 3px; }
  .import-body::-webkit-scrollbar-track { background: transparent; }
  .import-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- IMPORT SCREEN -->
<div class="screen" id="importScreen">
  <div class="import-header">
    <h1>Speed<span>Read</span></h1>
    <p>RSVP čtečka · vložte text nebo importujte soubor</p>
  </div>
  <div class="import-body">
    <div class="paste-area">
      <label>Vložte text</label>
      <textarea id="pasteInput" placeholder="Zkopírujte a vložte sem text článku..."></textarea>
    </div>

    <div class="file-zone" id="fileZone">
      <input type="file" id="fileInput" accept=".txt,.docx,.pdf">
      <span class="icon">📂</span>
      <p>Klepněte pro výběr souboru<br>nebo přetáhněte sem</p>
      <p class="filetypes">TXT · DOCX · PDF</p>
    </div>

    <div class="settings-row">
      <div class="setting-block">
        <label>Rychlost (WPM)</label>
        <div class="val-row">
          <input type="range" id="wpmStart" min="100" max="800" step="25" value="250">
          <span class="val-label" id="wpmStartVal">250</span>
        </div>
      </div>
      <div class="setting-block">
        <label>Velikost písma</label>
        <div class="val-row">
          <input type="range" id="fontScale" min="60" max="140" step="10" value="100">
          <span class="val-label" id="fontScaleVal">100%</span>
        </div>
      </div>
    </div>

    <p class="word-count" id="wordCount"></p>
    <button class="btn-start" id="btnStart" disabled>Začít číst →</button>
  </div>
</div>

<!-- READER SCREEN -->
<div class="screen hidden" id="readerScreen">
  <div class="reader-top">
    <button class="btn-back" id="btnBack">←</button>
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <span class="progress-label" id="progressLabel">0 / 0</span>
  </div>

  <div class="focus-area" id="focusArea">
    <div class="orp-line" id="orpLine">
      <div class="word-display" id="wordDisplay">—</div>
    </div>
    <p class="pause-hint" id="pauseHint">KLEPNĚTE PRO PAUZU</p>
  </div>

  <div class="context-preview" id="contextPreview"></div>

  <div class="reader-controls">
    <div class="wpm-row">
      <label>WPM</label>
      <input type="range" id="wpmReader" min="100" max="800" step="25" value="250">
      <span class="wpm-val" id="wpmReaderVal">250 wpm</span>
    </div>
    <div class="ctrl-row">
      <button class="btn-ctrl btn-skip" id="btnBack10" title="-10 slov">⏮ 10</button>
      <button class="btn-ctrl btn-play" id="btnPlayPause">▶</button>
      <button class="btn-ctrl btn-skip" id="btnFwd10" title="+10 slov">10 ⏭</button>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p id="loadingMsg">Zpracovávám soubor...</p>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── PDF.js worker ──
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
let words = [];
let idx = 0;
let playing = false;
let timer = null;
let wpm = 250;

// ── ELEMENTS ──
const pasteInput    = document.getElementById('pasteInput');
const fileInput     = document.getElementById('fileInput');
const fileZone      = document.getElementById('fileZone');
const wpmStartEl    = document.getElementById('wpmStart');
const wpmStartVal   = document.getElementById('wpmStartVal');
const fontScaleEl   = document.getElementById('fontScale');
const fontScaleVal  = document.getElementById('fontScaleVal');
const wordCountEl   = document.getElementById('wordCount');
const btnStart      = document.getElementById('btnStart');
const importScreen  = document.getElementById('importScreen');
const readerScreen  = document.getElementById('readerScreen');
const wordDisplay   = document.getElementById('wordDisplay');
const orpLine       = document.getElementById('orpLine');
const progressBar   = document.getElementById('progressBar');
const progressLabel = document.getElementById('progressLabel');
const contextPreview= document.getElementById('contextPreview');
const btnBack       = document.getElementById('btnBack');
const btnPlayPause  = document.getElementById('btnPlayPause');
const btnBack10     = document.getElementById('btnBack10');
const btnFwd10      = document.getElementById('btnFwd10');
const wpmReaderEl   = document.getElementById('wpmReader');
const wpmReaderVal  = document.getElementById('wpmReaderVal');
const focusArea     = document.getElementById('focusArea');
const pauseHint     = document.getElementById('pauseHint');
const loadingOverlay= document.getElementById('loadingOverlay');
const loadingMsg    = document.getElementById('loadingMsg');
const toastEl       = document.getElementById('toast');

// ── TOAST ──
let toastTimer;
function showToast(msg, dur = 2200) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), dur);
}

// ── LOADING ──
function setLoading(show, msg = 'Zpracovávám...') {
  loadingMsg.textContent = msg;
  loadingOverlay.classList.toggle('show', show);
}

// ── TEXT PROCESSING ──
function textToWords(raw) {
  return raw.trim().split(/\s+/).filter(w => w.length > 0);
}

function updateWordCount() {
  const raw = pasteInput.value.trim();
  if (raw) {
    const n = textToWords(raw).length;
    wordCountEl.textContent = `${n.toLocaleString('cs')} slov · ~${Math.round(n / wpm)} min při ${wpm} wpm`;
    btnStart.disabled = false;
  } else {
    wordCountEl.textContent = '';
    btnStart.disabled = words.length === 0;
  }
}

// ── ORP (Optimal Recognition Point) ──
function getOrpIndex(word) {
  const len = word.replace(/[^a-zA-ZÀ-ž0-9]/g, '').length;
  if (len <= 1) return 0;
  if (len <= 5) return 1;
  if (len <= 9) return 2;
  if (len <= 13) return 3;
  return 4;
}

function renderWord(word) {
  if (!word) { wordDisplay.textContent = ''; return; }
  const orp = getOrpIndex(word);
  const before = word.slice(0, orp);
  const mid    = word.slice(orp, orp + 1);
  const after  = word.slice(orp + 1);
  wordDisplay.innerHTML =
    (before ? `<span>${before}</span>` : '') +
    `<span class="orp-char">${mid}</span>` +
    (after  ? `<span>${after}</span>`  : '');

  // position ORP line
  const pct = word.length > 0 ? (orp / word.length) * 100 : 30;
  orpLine.style.setProperty('--orp-x', `${Math.max(10, Math.min(90, pct))}%`);
}

function renderContext() {
  const prev = words[idx - 1] || '';
  const curr = words[idx]     || '';
  const next = words[idx + 1] || '';
  contextPreview.innerHTML =
    `<span class="ctx-prev">${prev}</span> ` +
    `<span class="ctx-curr">${curr}</span> ` +
    `<span class="ctx-next">${next}</span>`;
}

function updateProgress() {
  const pct = words.length > 1 ? (idx / (words.length - 1)) * 100 : 0;
  progressBar.style.width = pct + '%';
  progressLabel.textContent = `${idx + 1} / ${words.length}`;
}

// ── PLAYBACK ──
function getDelay(word) {
  const base = 60000 / wpm;
  // pause longer on punctuation
  if (/[.!?]$/.test(word)) return base * 2.2;
  if (/[,;:]$/.test(word)) return base * 1.4;
  if (word.length > 10)    return base * 1.2;
  return base;
}

function tick() {
  if (idx >= words.length) { stop(); return; }
  renderWord(words[idx]);
  renderContext();
  updateProgress();
  const delay = getDelay(words[idx]);
  idx++;
  timer = setTimeout(tick, delay);
}

function play() {
  if (idx >= words.length) idx = 0;
  playing = true;
  btnPlayPause.textContent = '⏸';
  pauseHint.textContent = 'KLEPNĚTE PRO PAUZU';
  tick();
}

function pause() {
  playing = false;
  clearTimeout(timer);
  btnPlayPause.textContent = '▶';
  pauseHint.textContent = 'KLEPNĚTE PRO POKRAČOVÁNÍ';
}

function stop() {
  pause();
  pauseHint.textContent = 'KONEC TEXTU · klepněte pro restart';
  btnPlayPause.textContent = '↺';
}

function togglePlay() {
  if (idx >= words.length) { idx = 0; play(); return; }
  playing ? pause() : play();
}

// ── FILE IMPORT ──
async function handleFile(file) {
  if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  setLoading(true, `Načítám ${file.name}…`);
  try {
    let text = '';
    if (ext === 'txt') {
      text = await file.text();
    } else if (ext === 'docx') {
      const arr = await file.arrayBuffer();
      const res = await mammoth.extractRawText({ arrayBuffer: arr });
      text = res.value;
    } else if (ext === 'pdf') {
      text = await extractPdfText(file);
    } else {
      showToast('Nepodporovaný formát souboru');
      setLoading(false);
      return;
    }
    pasteInput.value = text;
    updateWordCount();
    showToast(`✓ Načteno: ${textToWords(text).length.toLocaleString('cs')} slov`);
  } catch (e) {
    console.error(e);
    showToast('Chyba při čtení souboru');
  }
  setLoading(false);
}

async function extractPdfText(file) {
  const arr = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: arr }).promise;
  let out = '';
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    out += content.items.map(s => s.str).join(' ') + '\n';
  }
  return out;
}

// ── EVENTS: IMPORT SCREEN ──
pasteInput.addEventListener('input', updateWordCount);

wpmStartEl.addEventListener('input', () => {
  wpm = +wpmStartEl.value;
  wpmReaderEl.value = wpm;
  wpmStartVal.textContent = wpm;
  wpmReaderVal.textContent = wpm + ' wpm';
  updateWordCount();
});

fontScaleEl.addEventListener('input', () => {
  const v = +fontScaleEl.value;
  fontScaleVal.textContent = v + '%';
  document.documentElement.style.setProperty('--word-size', `clamp(2rem, ${v * 0.1}vw, ${v * 0.045}rem)`);
});

fileInput.addEventListener('change', () => handleFile(fileInput.files[0]));

fileZone.addEventListener('dragover', e => { e.preventDefault(); fileZone.classList.add('dragover'); });
fileZone.addEventListener('dragleave', () => fileZone.classList.remove('dragover'));
fileZone.addEventListener('drop', e => {
  e.preventDefault();
  fileZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

btnStart.addEventListener('click', () => {
  const raw = pasteInput.value.trim();
  if (!raw) return;
  words = textToWords(raw);
  if (words.length === 0) return;
  idx = 0;
  wpm = +wpmStartEl.value;
  wpmReaderEl.value = wpm;
  wpmReaderVal.textContent = wpm + ' wpm';

  importScreen.classList.add('hidden');
  readerScreen.classList.remove('hidden');
  renderWord(words[0]);
  renderContext();
  updateProgress();
  setTimeout(play, 400);
});

// ── EVENTS: READER SCREEN ──
btnBack.addEventListener('click', () => {
  pause();
  readerScreen.classList.add('hidden');
  importScreen.classList.remove('hidden');
});

focusArea.addEventListener('click', togglePlay);
btnPlayPause.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });

btnBack10.addEventListener('click', (e) => {
  e.stopPropagation();
  const wasPlaying = playing;
  pause();
  idx = Math.max(0, idx - 11);
  renderWord(words[idx]);
  renderContext();
  updateProgress();
  if (wasPlaying) setTimeout(play, 150);
});

btnFwd10.addEventListener('click', (e) => {
  e.stopPropagation();
  const wasPlaying = playing;
  pause();
  idx = Math.min(words.length - 1, idx + 10);
  renderWord(words[idx]);
  renderContext();
  updateProgress();
  if (wasPlaying) setTimeout(play, 150);
});

wpmReaderEl.addEventListener('input', () => {
  wpm = +wpmReaderEl.value;
  wpmReaderVal.textContent = wpm + ' wpm';
});

// keyboard (desktop)
document.addEventListener('keydown', e => {
  if (readerScreen.classList.contains('hidden')) return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft')  btnBack10.click();
  if (e.code === 'ArrowRight') btnFwd10.click();
});

// ── SERVICE WORKER (PWA) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registered:', reg.scope))
      .catch(err => console.warn('SW failed:', err));
  });
}
</script>
</body>
</html>
